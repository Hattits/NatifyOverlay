name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Add these permissions to fix the 403 error
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Publish Standalone EXE
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true /p:PublishReadyToRun=true -o ./publish

    - name: Create ZIP
      shell: pwsh
      run: Compress-Archive -Path ./publish/* -DestinationPath ./NatifyOverlay_${{ github.ref_name }}.zip

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ./NatifyOverlay_${{ github.ref_name }}.zip
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
